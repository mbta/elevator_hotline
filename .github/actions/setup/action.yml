name: Set up tools
description: Sets up and caches ASDF tools and dependencies
runs:
  using: composite
  steps:
    - uses: actions/cache@v6.1.0
      id: asdf-cache
      with:
        path: ~/.asdf
        key: asdf-${{ hashFiles('.tool-versions') }}

    - uses: asdf-vm/actions/install@v4
      if: steps.asdf-cache.outputs.cache-hit != 'true'

    - name: Setup ASDF environment
      uses: asdf-vm/actions/setup@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1
      with:
        skip_install: true
      if: steps.asdf-cache.outputs.cache-hit == 'true'

    - name: Reshim ASDF
      shell: bash
      run: asdf reshim
      if: steps.asdf-cache.outputs.cache-hit == 'true'

    - uses: actions/cache@v6.1.0
      id: deps-cache
      with:
        path: node_modules
        key: deps-${{ hashFiles('.tool-versions', 'package-lock.json') }}

    - name: Install dependencies
      if: steps.deps-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci
